name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # NEW STEP: Install Gradle on the runner so we can generate the missing wrapper
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # FIXED STEP: We generate the missing gradlew file first, then make it executable
      - name: Generate missing Gradle Wrapper
        run: |
          cd equation-writer
          gradle wrapper
          chmod +x gradlew

      # Step 4: Build the debug APK
      - name: Build with Gradle
        run: |
          cd equation-writer
          ./gradlew assembleDebug --stacktrace

      # Step 5: Upload the finished APK so you can download it
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: equation-writer-apk
          path: equation-writer/app/build/outputs/apk/debug/app-debug.apk
