name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository using the latest v4 action
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java using the latest action version
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step 3: Grant execute permission to the Gradle wrapper
      # Added an 'ls' command so we can see if the files actually exist in the logs
      - name: Grant execute permission for gradlew
        run: |
          cd equation-writer
          ls -la
          chmod +x gradlew

      # Step 4: Build the debug APK
      - name: Build with Gradle
        run: |
          cd equation-writer
          ./gradlew assembleDebug --stacktrace
