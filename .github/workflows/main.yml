name: Unzip Equation Writer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Gives the script permission to commit files back to your repo
permissions:
  contents: write

jobs:
  unzip-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # We target the file inside the equation-writer folder
      # and extract it directly into that same folder
      - name: Unzip Equation Writer
        run: |
          unzip equation-writer.zip -d equation-writer

      # Commit the newly unzipped files back to your repository
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated unzip of equation-writer" || echo "No changes to commit"
          git push
    
