name: Unzip and Push to Repo

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unzip-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip Equation Writer
        run: |
          # Unzip directly into your main folder instead of a hidden one
          unzip equation-writer.zip -d .

      # NEW STEP: Commit and push the new files back to the main branch
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated unzip of equation-writer" || echo "No changes to commit"
          git push
    
